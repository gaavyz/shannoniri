<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shannon Torrevieja · Cocktail AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --negro:    #000000;
      --lima:     #a7aa3c;
      --lima-l:   #c4c84a;
      --oliva:    #5f5727;
      --verde:    #0a3d2e;
      --verde-m:  #0d5240;
      --rojo:     #ac1619;
      --cream:    #f5f0e8;
      --cdim:     rgba(245,240,232,.65);
      --bord:     rgba(167,170,60,.25);
      --surf:     rgba(255,255,255,.05);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Open Sans',sans-serif;background:var(--verde);color:var(--cream);}

    /* Franja superior con colores de marca */
    body::before{content:'';position:fixed;top:0;left:0;right:0;height:5px;z-index:100;
      background:linear-gradient(90deg, var(--rojo) 0%, var(--rojo) 33%, var(--negro) 33%, var(--negro) 66%, var(--lima) 66%, var(--lima) 100%);}

    /* Textura sutil de fondo */
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse at 20% 50%, rgba(172,22,25,.08) 0%, transparent 60%),
                 radial-gradient(ellipse at 80% 20%, rgba(167,170,60,.06) 0%, transparent 50%);}

    #wrap{min-height:100vh;padding:5px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1;}
    #card{width:100%;max-width:480px;padding:0 16px 40px;}

    /* Lang toggle */
    .lang-toggle{display:flex;justify-content:flex-end;margin:20px 0 0;}
    .lang-wrap{display:flex;background:rgba(0,0,0,.3);border-radius:20px;padding:3px;border:.5px solid var(--bord);}
    .lang-btn{padding:4px 14px;font-size:11px;font-family:'Open Sans',sans-serif;font-weight:700;letter-spacing:.08em;cursor:pointer;border:none;border-radius:16px;background:transparent;color:rgba(245,240,232,.4);transition:all .2s;text-transform:uppercase;}
    .lang-btn.active{background:var(--lima);color:var(--negro);}

    .screen{display:none;}.screen.active{display:block;}

    /* ── START ── */
    #screen-start{text-align:center;padding-top:1.5rem;}

    .pub-logo{width:180px;margin:0 auto 1rem;display:block;filter:drop-shadow(0 4px 20px rgba(0,0,0,.5));}
    .pub-name{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:700;color:var(--cream);letter-spacing:.15em;text-transform:uppercase;line-height:1;}
    .pub-city{font-family:'Libre Baskerville',serif;font-size:14px;letter-spacing:.25em;color:var(--lima);margin-top:4px;text-transform:uppercase;}

    .div-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--lima),transparent);margin:1.25rem auto;}

    .s-head{font-family:'Libre Baskerville',serif;font-size:19px;font-style:italic;color:var(--cream);margin-bottom:8px;}
    .s-desc{font-size:13px;color:var(--cdim);line-height:1.65;max-width:360px;margin:0 auto 1.75rem;}

    .alc-row{display:flex;gap:12px;margin-bottom:1.75rem;}
    .alc-btn{flex:1;padding:14px 10px;border-radius:10px;cursor:pointer;border:1px solid var(--bord);background:var(--surf);color:rgba(245,240,232,.6);font-family:'Open Sans',sans-serif;font-size:13px;font-weight:600;transition:all .2s;text-align:center;line-height:1.4;}
    .alc-btn .ico{font-size:22px;display:block;margin-bottom:5px;}
    .alc-btn:hover{border-color:var(--lima);color:var(--cream);background:rgba(167,170,60,.08);}
    .alc-btn.sel{background:rgba(167,170,60,.18);border-color:var(--lima);color:var(--lima-l);}

    .cta{width:100%;padding:15px;font-family:'Open Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:10px;border:none;background:var(--rojo);color:var(--cream);transition:all .2s;opacity:.35;pointer-events:none;}
    .cta.on{opacity:1;pointer-events:all;}.cta.on:hover{background:#c41a1d;}

    /* ── QUESTIONS ── */
    #screen-questions{padding-top:1.5rem;}

    /* Dax avatar en preguntas */
    .dax-wrap{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;}
    .dax-avatar{width:52px;height:52px;border-radius:50%;border:2px solid var(--lima);object-fit:cover;flex-shrink:0;background:var(--negro);}
    .dax-bubble{background:rgba(0,0,0,.35);border:1px solid var(--bord);border-radius:0 12px 12px 12px;padding:10px 14px;flex:1;}
    .dax-name{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--lima);text-transform:uppercase;margin-bottom:4px;}
    .dax-text{font-family:'Libre Baskerville',serif;font-size:16px;color:var(--cream);line-height:1.45;font-style:italic;}

    .prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;}
    .prog-track{flex:1;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--lima);border-radius:2px;transition:width .4s ease;}
    .prog-lbl{font-size:10px;color:rgba(245,240,232,.38);letter-spacing:.08em;white-space:nowrap;font-family:'Open Sans',sans-serif;}

    .q-opts{display:flex;flex-direction:column;gap:9px;}
    .q-opt{padding:13px 18px;border-radius:10px;cursor:pointer;border:1px solid var(--bord);background:rgba(0,0,0,.25);color:rgba(245,240,232,.8);font-family:'Open Sans',sans-serif;font-size:14px;line-height:1.4;text-align:left;transition:all .18s;}
    .q-opt:hover{border-color:rgba(167,170,60,.6);color:var(--cream);background:rgba(167,170,60,.08);}
    .q-opt.sel{border-color:var(--lima);background:rgba(167,170,60,.18);color:var(--lima-l);}

    /* ── LOADING ── */
    #screen-loading{text-align:center;padding:5rem 1rem;}
    .dax-loading{width:80px;margin:0 auto 1.5rem;display:block;animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.9;}50%{transform:scale(1.08);opacity:1;}}
    .l-title{font-family:'Libre Baskerville',serif;font-size:19px;font-style:italic;color:var(--cream);margin-bottom:8px;}
    .l-sub{font-size:13px;color:rgba(245,240,232,.45);font-family:'Open Sans',sans-serif;}

    /* ── RESULT ── */
    #screen-result{padding-top:1.5rem;}
    .r-head{text-align:center;margin-bottom:1.5rem;}
    .r-emoji{font-size:52px;margin-bottom:10px;display:block;}
    .r-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
    .r-badge{display:inline-block;padding:4px 14px;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;border:1px solid rgba(167,170,60,.4);border-radius:20px;color:var(--lima);font-family:'Open Sans',sans-serif;}
    .r-name{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:700;color:var(--cream);margin-bottom:8px;}
    .r-tagline{font-family:'Libre Baskerville',serif;font-size:15px;font-style:italic;color:rgba(245,240,232,.55);line-height:1.55;max-width:340px;margin:0 auto;}

    .gdiv{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--lima),transparent);margin:1.5rem auto;}

    .card{background:rgba(0,0,0,.3);border:1px solid var(--bord);border-radius:12px;padding:1.125rem 1.25rem;margin-bottom:12px;}
    .clbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--lima);margin-bottom:12px;font-family:'Open Sans',sans-serif;}

    .ing-list{display:flex;flex-direction:column;gap:8px;}
    .ing-i{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:rgba(245,240,232,.85);line-height:1.4;font-family:'Open Sans',sans-serif;}
    .idot{width:6px;height:6px;border-radius:50%;background:var(--rojo);flex-shrink:0;margin-top:7px;}

    /* Nota con Dax */
    .dax-nota{display:flex;gap:12px;align-items:flex-start;background:rgba(0,0,0,.3);border:1px solid var(--bord);border-radius:12px;padding:1rem 1.125rem;margin-bottom:12px;}
    .dax-nota-img{width:44px;height:44px;border-radius:50%;border:2px solid var(--rojo);object-fit:cover;flex-shrink:0;}
    .dax-nota-text{flex:1;}
    .dax-nota-name{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--rojo);text-transform:uppercase;margin-bottom:4px;font-family:'Open Sans',sans-serif;}
    .dax-nota-quote{font-family:'Libre Baskerville',serif;font-size:13px;font-style:italic;color:rgba(245,240,232,.65);line-height:1.6;}

    .act-btns{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
    .abtn{width:100%;padding:14px;font-family:'Open Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:10px;transition:all .2s;}
    .abtn.red{background:var(--rojo);color:var(--cream);border:none;}.abtn.red:hover{background:#c41a1d;}
    .abtn.out{background:transparent;border:1px solid var(--bord);color:rgba(245,240,232,.7);}.abtn.out:hover{border-color:var(--lima);color:var(--cream);}

    .err-wrap{text-align:center;padding:3rem 1rem;}
    .err-msg{color:#e07a7a;font-size:15px;line-height:1.7;margin-bottom:1.5rem;}
    .err-detail{background:rgba(0,0,0,.3);border:1px solid rgba(200,80,80,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:rgba(245,240,232,.35);text-align:left;word-break:break-all;margin-bottom:1.25rem;}
    .footer{text-align:center;margin-top:2.5rem;font-size:11px;color:rgba(245,240,232,.2);letter-spacing:.08em;font-family:'Open Sans',sans-serif;}
  </style>
</head>

let lang='en',withAlc=null,qIdx=0,tags=[],loadInt,loadTick=0;

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setLang(l){lang=l;document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='es')||(i===1&&l==='en')));applyStart();}
function applyStart(){const t=L[lang];document.getElementById('s-head').textContent=t.head;document.getElementById('s-desc').textContent=t.desc;document.getElementById('lbl-alc').textContent=t.lAlc;document.getElementById('lbl-noalc').textContent=t.lNoAlc;document.getElementById('lbl-start').textContent=t.lStart;}
function pickAlc(v){withAlc=v;document.getElementById('btn-alc').classList.toggle('sel',v===true);document.getElementById('btn-noalc').classList.toggle('sel',v===false);document.getElementById('start-btn').classList.add('on');}
function startQuiz(){qIdx=0;tags=[];show('screen-questions');renderQ();}
function renderQ(){
  const qs=L[lang].qs,q=qs[qIdx];
  // Total real: si sin alcohol, restar la pregunta de base alcohólica
  const tot=withAlc?qs.length:qs.length-1;
  // Posición visual: si sin alcohol y ya pasamos la pregunta de base, restar 1
  const alcQIdx=qs.findIndex(isAlcoholQuestion);
  const visIdx=(!withAlc && qIdx>alcQIdx)?qIdx-1:qIdx;
  document.getElementById('prog-fill').style.width=(((visIdx)/tot)*100)+'%';
  document.getElementById('prog-lbl').textContent=L[lang].prog(visIdx+1,tot);
  document.getElementById('q-text').textContent=q.t;
  const c=document.getElementById('q-opts');c.innerHTML='';
  q.o.forEach(opt=>{const b=document.createElement('button');b.className='q-opt';b.textContent=opt.t;b.onclick=()=>pick(opt,b);c.appendChild(b);});
}
function isAlcoholQuestion(q){
  // Detecta si es la pregunta de base alcohólica por sus tags
  return q.o && q.o.some(o=>o.g && (o.g.includes('gin')||o.g.includes('ron')||o.g.includes('rum')));
}
function pick(opt,btn){
  document.querySelectorAll('.q-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');
  tags=[...tags,...opt.g];
  setTimeout(()=>{
    qIdx++;
    // Si sin alcohol, saltar la pregunta de base alcohólica
    if(!withAlc && qIdx<L[lang].qs.length && isAlcoholQuestion(L[lang].qs[qIdx])){
      qIdx++;
    }
    if(qIdx<L[lang].qs.length)renderQ();else generate();
  },300);
}
function tickLoad(){const row=L[lang].ll[loadTick%3];document.getElementById('l-title').textContent=row[0];document.getElementById('l-sub').textContent=row[1];loadTick++;}
function startLoad(){loadTick=0;tickLoad();loadInt=setInterval(tickLoad,1800);}

function buildPrompt(){
  const isEs=lang==='es';
  const profile=tags.join(', ');
  const lista = withAlc ? LISTA_CON_ALCOHOL : LISTA_SIN_ALCOHOL;
  const recetasTexto = lista.map(nombre => {
    const r = RECETAS[nombre];
    if(!r) return `${nombre}: ingredientes no especificados`;
    return `${nombre} | Ingredientes: ${r.ing.join(', ')} | Vaso: ${r.vaso} | Técnica: ${r.tecnica}`;
  }).join('\n');

  if(isEs) return `Eres el bartender IA del Shannon Iris Pub, un auténtico pub irlandés en España.

Perfil de personalidad del cliente: ${profile}
El cliente quiere un cóctel: ${withAlc?'CON ALCOHOL':'SIN ALCOHOL'}

CARTA DE CÓCTELES DEL PUB (elige SOLO de esta lista):
${recetasTexto}

INSTRUCCIONES IMPORTANTES:
- Elige el cóctel que MEJOR encaje con la personalidad del cliente
- NO inventes cócteles nuevos — solo los de la lista
- Si elige un Mojito (con o sin alcohol), debe especificar el sabor concreto de Oxefruit que mejor encaje con la personalidad del cliente (fresa, mango, maracuyá, coco, piña, melón, sandía, frambuesa, guayaba, mandarina, manzana o yuzu) y reflejarlo en el nombre (ej: "Mojito de Mango") y en los ingredientes
- En "ingredientes" pon SOLO los nombres de los ingredientes, SIN cantidades y SIN hielo
- En "pasos" describe la preparación de forma atractiva
- Adapta el tagline y la nota a la personalidad del cliente

Responde ÚNICAMENTE con JSON puro sin backticks ni texto extra:
{"nombre":"...","tagline":"...","personalidad":"...","vaso":"...","tecnica":"...","ingredientes":[{"nombre":"ingrediente sin cantidad"}],"pasos":["..."],"nota":"...","emoji":"..."}`;

  // Traducción inglés de ingredientes para el prompt EN
  const recetasEN = lista.map(nombre => {
    const r = RECETAS[nombre];
    if(!r) return `${nombre}`;
    return `${nombre} | Ingredients: ${r.ing.join(', ')} | Glass: ${r.vaso} | Technique: ${r.tecnica}`;
  }).join('\n');

  return `You are the AI bartender at Shannon Iris Pub, an authentic Irish pub in Spain.

Customer personality profile: ${profile}
The customer wants a cocktail: ${withAlc?'WITH ALCOHOL':'WITHOUT ALCOHOL'}

PUB COCKTAIL MENU (choose ONLY from this list):
${recetasEN}

IMPORTANT INSTRUCTIONS:
- Choose the cocktail that BEST matches the customer's personality
- Do NOT invent new cocktails — only from the list
- If the cocktail chosen is a Mojito (with or without alcohol), specify the exact Oxefruit flavour that best matches the customer's personality (strawberry, mango, passion fruit, coconut, pineapple, melon, watermelon, raspberry, guava, mandarin, apple or yuzu) and reflect it in the name (e.g. "Mango Mojito") and ingredients
- In "ingredientes" list ONLY ingredient names, NO quantities and NO ice
- In "pasos" describe the preparation in an engaging way
- Adapt the tagline and note to the customer's personality

Respond ONLY with raw JSON, no backticks or extra text:
{"nombre":"...","tagline":"...","personalidad":"...","vaso":"...","tecnica":"...","ingredientes":[{"nombre":"ingredient name only"}],"pasos":["..."],"nota":"...","emoji":"..."}`;
}

async function generate(){
  show('screen-loading');startLoad();
  try{
    const res=await fetch('/api/cocktail',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:buildPrompt()})});
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(JSON.stringify(err));}
    const {text}=await res.json();
    const s=text.indexOf('{'),e=text.lastIndexOf('}');
    if(s<0||e<0)throw new Error('No JSON in response: '+text.slice(0,200));
    const cocktail=JSON.parse(text.slice(s,e+1));
    clearInterval(loadInt);renderResult(cocktail);
  }catch(err){clearInterval(loadInt);showError(err.message);}
}

function showError(msg){
  const t=L[lang];
  document.getElementById('result-content').innerHTML=`
    <div class="err-wrap">
      <div class="r-emoji">⚠️</div>
      <div class="err-msg">${t.errTitle}.<br><small>${t.errHint}</small></div>
      <div class="err-detail">${msg}</div>
      <div class="act-btns" style="max-width:300px;margin:0 auto">
        <button class="abtn gold" onclick="generate()">↺ ${t.retry}</button>
        <button class="abtn red" onclick="resetApp()">← ${t.bR}</button>
      </div>
    </div>`;
  show('screen-result');
}

function resetApp(){
  qIdx=0;tags=[];withAlc=null;
  document.getElementById('btn-alc').classList.remove('sel');
  document.getElementById('btn-noalc').classList.remove('sel');
  document.getElementById('start-btn').classList.remove('on');
  show('screen-start');
}
applyStart();
