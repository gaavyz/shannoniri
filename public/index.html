<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shannon Iris Pub · Cocktail AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root{--gold:#c9922a;--gold-l:#e8b84b;--dark:#1a1208;--green:#1b4332;--cream:#f5edd8;--cdim:rgba(245,237,216,.62);--bord:rgba(201,146,42,.22);--surf:rgba(255,255,255,.04);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Lato',sans-serif;background:var(--dark);color:var(--cream);}
    body::before{content:'';position:fixed;top:0;left:0;right:0;height:4px;z-index:100;background:repeating-linear-gradient(90deg,var(--gold) 0,var(--gold) 14px,var(--green) 14px,var(--green) 28px);}
    #wrap{min-height:100vh;padding:4px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    #card{width:100%;max-width:480px;padding:0 16px 40px;}
    .lang-toggle{display:flex;justify-content:flex-end;margin:20px 0 0;}
    .lang-wrap{display:flex;background:rgba(255,255,255,.07);border-radius:20px;padding:3px;border:.5px solid var(--bord);}
    .lang-btn{padding:4px 14px;font-size:12px;font-family:'Lato',sans-serif;font-weight:700;letter-spacing:.05em;cursor:pointer;border:none;border-radius:16px;background:transparent;color:rgba(245,237,216,.4);transition:all .2s;}
    .lang-btn.active{background:var(--gold);color:var(--dark);}
    .screen{display:none;}.screen.active{display:block;}
    #screen-start{text-align:center;padding-top:2rem;}
    .shamrock{font-size:52px;display:block;filter:drop-shadow(0 0 16px rgba(201,146,42,.55));margin-bottom:8px;}
    .pub-name{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--gold);letter-spacing:.02em;}
    .pub-sub{font-size:11px;letter-spacing:.2em;color:rgba(245,237,216,.35);margin-top:5px;text-transform:uppercase;}
    .div-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem auto;}
    .s-head{font-family:'Playfair Display',serif;font-size:21px;font-style:italic;color:var(--cream);margin-bottom:10px;}
    .s-desc{font-size:14px;color:var(--cdim);line-height:1.65;max-width:360px;margin:0 auto 2rem;}
    .alc-row{display:flex;gap:12px;margin-bottom:2rem;}
    .alc-btn{flex:1;padding:14px 10px;border-radius:10px;cursor:pointer;border:1px solid var(--bord);background:var(--surf);color:rgba(245,237,216,.6);font-family:'Lato',sans-serif;font-size:13px;font-weight:700;transition:all .2s;text-align:center;line-height:1.4;}
    .alc-btn .ico{font-size:24px;display:block;margin-bottom:6px;}
    .alc-btn:hover{border-color:var(--gold);color:var(--cream);}
    .alc-btn.sel{background:rgba(201,146,42,.18);border-color:var(--gold);color:var(--gold-l);}
    .cta{width:100%;padding:15px;font-family:'Lato',sans-serif;font-size:14px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:10px;border:none;background:var(--gold);color:var(--dark);transition:all .2s;opacity:.35;pointer-events:none;}
    .cta.on{opacity:1;pointer-events:all;}.cta.on:hover{background:var(--gold-l);}
    #screen-questions{padding-top:1.5rem;}
    .prog-wrap{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;}
    .prog-track{flex:1;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
    .prog-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s ease;}
    .prog-lbl{font-size:11px;color:rgba(245,237,216,.38);letter-spacing:.08em;white-space:nowrap;}
    .q-text{font-family:'Playfair Display',serif;font-size:20px;color:var(--cream);line-height:1.45;margin-bottom:1.5rem;}
    .q-opts{display:flex;flex-direction:column;gap:10px;}
    .q-opt{padding:14px 18px;border-radius:10px;cursor:pointer;border:1px solid var(--bord);background:var(--surf);color:rgba(245,237,216,.75);font-family:'Lato',sans-serif;font-size:14px;line-height:1.4;text-align:left;transition:all .18s;}
    .q-opt:hover{border-color:rgba(201,146,42,.6);color:var(--cream);background:rgba(201,146,42,.07);}
    .q-opt.sel{border-color:var(--gold);background:rgba(201,146,42,.15);color:var(--gold-l);}
    #screen-loading{text-align:center;padding:5rem 1rem;}
    .pint{width:56px;height:70px;border:2px solid rgba(201,146,42,.3);border-radius:0 0 10px 10px;position:relative;margin:0 auto 1.75rem;overflow:hidden;}
    .pint-fill{position:absolute;bottom:0;left:0;right:0;background:var(--gold);opacity:.7;animation:fu 2s ease-in-out infinite alternate;}
    @keyframes fu{from{height:12%}to{height:92%}}
    .l-title{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--cream);margin-bottom:8px;}
    .l-sub{font-size:13px;color:rgba(245,237,216,.42);}
    #screen-result{padding-top:1.5rem;}
    .r-head{text-align:center;margin-bottom:1.5rem;}
    .r-emoji{font-size:56px;margin-bottom:10px;display:block;}
    .r-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:12px;}
    .r-badge{display:inline-block;padding:4px 14px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;border:1px solid rgba(201,146,42,.4);border-radius:20px;color:var(--gold);}
    .r-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--cream);margin-bottom:8px;}
    .r-tagline{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:rgba(245,237,216,.52);line-height:1.55;max-width:340px;margin:0 auto;}
    .gdiv{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:1.5rem auto;}
    .card{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:1.125rem 1.25rem;margin-bottom:12px;}
    .clbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--gold);margin-bottom:12px;}
    .meta-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px;}
    .meta-i{font-size:13px;color:rgba(245,237,216,.48);}
    .meta-i b{color:var(--cream);font-weight:700;}
    .ing-list{display:flex;flex-direction:column;gap:8px;}
    .ing-i{display:flex;gap:12px;align-items:flex-start;font-size:14px;color:rgba(245,237,216,.8);line-height:1.4;}
    .idot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:7px;}
    .iqty{color:var(--gold-l);font-weight:700;min-width:56px;}
    .steps{display:flex;flex-direction:column;gap:10px;}
    .step-i{display:flex;gap:14px;font-size:14px;color:rgba(245,237,216,.8);line-height:1.55;}
    .sn{color:var(--gold);font-weight:700;min-width:18px;font-family:'Playfair Display',serif;}
    .bt-note{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:rgba(245,237,216,.52);line-height:1.6;text-align:center;}
    .act-btns{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
    .abtn{width:100%;padding:14px;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border-radius:10px;transition:all .2s;}
    .abtn.gold{background:var(--gold);color:var(--dark);border:none;}.abtn.gold:hover{background:var(--gold-l);}
    .abtn.out{background:transparent;border:1px solid var(--bord);color:rgba(245,237,216,.7);}.abtn.out:hover{border-color:var(--gold);color:var(--cream);}
    .err-wrap{text-align:center;padding:3rem 1rem;}
    .err-msg{color:#e07a7a;font-size:15px;line-height:1.7;margin-bottom:1.5rem;}
    .err-detail{background:rgba(255,255,255,.04);border:1px solid rgba(200,80,80,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:rgba(245,237,216,.35);text-align:left;word-break:break-all;margin-bottom:1.25rem;}
    .footer{text-align:center;margin-top:2.5rem;font-size:11px;color:rgba(245,237,216,.2);letter-spacing:.08em;}
  </style>
</head>
<body>
<div id="wrap">
  <div id="card">
    <div class="lang-toggle">
      <div class="lang-wrap">
        <button class="lang-btn active" onclick="setLang('es')">ES</button>

    </div>

      <div class="q-opts" id="q-opts"></div>
    </div>
    <div id="screen-loading" class="screen">
      <div class="pint"><div class="pint-fill"></div></div>
      <div class="l-title" id="l-title"></div>
      <div class="l-sub" id="l-sub"></div>
    </div>
    <div id="screen-result" class="screen">

    </div>
    <div class="footer">Shannon Iris Pub &copy; 2025</div>
  </div>
</div>

let lang='en',withAlc=null,qIdx=0,tags=[],loadInt,loadTick=0;

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function setLang(l){lang=l;document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='es')||(i===1&&l==='en')));applyStart();}
function applyStart(){const t=L[lang];document.getElementById('s-head').textContent=t.head;document.getElementById('s-desc').textContent=t.desc;document.getElementById('lbl-alc').textContent=t.lAlc;document.getElementById('lbl-noalc').textContent=t.lNoAlc;document.getElementById('lbl-start').textContent=t.lStart;}
function pickAlc(v){withAlc=v;document.getElementById('btn-alc').classList.toggle('sel',v===true);document.getElementById('btn-noalc').classList.toggle('sel',v===false);document.getElementById('start-btn').classList.add('on');}
function startQuiz(){qIdx=0;tags=[];show('screen-questions');renderQ();}
function renderQ(){
  const qs=L[lang].qs,q=qs[qIdx],tot=qs.length;
  document.getElementById('prog-fill').style.width=((qIdx/tot)*100)+'%';
  document.getElementById('prog-lbl').textContent=L[lang].prog(qIdx+1,tot);
  document.getElementById('q-text').textContent=q.t;
  const c=document.getElementById('q-opts');c.innerHTML='';
  q.o.forEach(opt=>{const b=document.createElement('button');b.className='q-opt';b.textContent=opt.t;b.onclick=()=>pick(opt,b);c.appendChild(b);});
}
function pick(opt,btn){
  document.querySelectorAll('.q-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');
  tags=[...tags,...opt.g];
  setTimeout(()=>{qIdx++;if(qIdx<L[lang].qs.length)renderQ();else generate();},300);
}
function tickLoad(){const row=L[lang].ll[loadTick%3];document.getElementById('l-title').textContent=row[0];document.getElementById('l-sub').textContent=row[1];loadTick++;}
function startLoad(){loadTick=0;tickLoad();loadInt=setInterval(tickLoad,1800);}

function buildPrompt(){
  const isEs=lang==='es';
  const profile=tags.join(', ');
  const alcMode=withAlc?(isEs?'CON ALCOHOL':'WITH ALCOHOL'):(isEs?'SIN ALCOHOL (mocktail)':'WITHOUT ALCOHOL (mocktail)');
  if(isEs) return `Eres el bartender IA del Shannon Iris Pub, un auténtico pub irlandés en España.
Perfil del cliente: ${profile}
El cóctel debe ser: ${alcMode}

INGREDIENTES DISPONIBLES (usa SOLO estos):
PURÉS DE FRUTA: ${ING.pures_es}
SIROPES: ${ING.siropes_es}
ZUMOS: ${ING.zumos_es}
${withAlc?`GINEBRAS: ${ING.gin_es}\nVODKAS: ${ING.vodka_es}\nRONES: ${ING.ron_es}\nTEQUILAS: ${ING.tequila_es}\nWHISKIES Y BOURBONS: ${ING.whisky_es}\nLICORES: ${ING.licores_es}`:`BASES SIN ALCOHOL: ${ING.noalc_es}`}
REFRESCOS Y MIXERS: ${ING.mixers_es}

Crea un cóctel original con nombre poético o irlandés, adaptado al perfil del cliente.
Responde ÚNICAMENTE con JSON puro sin backticks:
{"nombre":"...","tagline":"...","personalidad":"...","vaso":"...","tecnica":"...","ingredientes":[{"nombre":"...","cantidad":"..."}],"pasos":["..."],"nota":"...","emoji":"..."}`;

  return `You are the AI bartender at Shannon Iris Pub, an authentic Irish pub in Spain.
Customer profile: ${profile}
The cocktail must be: ${alcMode}

AVAILABLE INGREDIENTS (use ONLY these):
FRUIT PURÉES: ${ING.pures_en}
SYRUPS: ${ING.siropes_en}
JUICES: ${ING.zumos_en}
${withAlc?`GINS: ${ING.gin_en}\nVODKAS: ${ING.vodka_en}\nRUMS: ${ING.ron_en}\nTEQUILAS: ${ING.tequila_en}\nWHISKIES & BOURBONS: ${ING.whisky_en}\nLIQUEURS: ${ING.licores_en}`:`ALCOHOL-FREE BASES: ${ING.noalc_en}`}
MIXERS: ${ING.mixers_en}

Create an original cocktail with a poetic or Irish-inspired name, tailored to the customer's profile.
Respond ONLY with raw JSON, no backticks:
{"nombre":"...","tagline":"...","personalidad":"...","vaso":"...","tecnica":"...","ingredientes":[{"nombre":"...","cantidad":"..."}],"pasos":["..."],"nota":"...","emoji":"..."}`;
}

async function generate(){
  show('screen-loading');startLoad();
  try{
    const res=await fetch('/api/cocktail',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:buildPrompt()})});
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(JSON.stringify(err));}
    const {text}=await res.json();
    const s=text.indexOf('{'),e=text.lastIndexOf('}');
    if(s<0||e<0)throw new Error('No JSON in response: '+text.slice(0,200));
    const cocktail=JSON.parse(text.slice(s,e+1));
    clearInterval(loadInt);renderResult(cocktail);
  }catch(err){clearInterval(loadInt);showError(err.message);}
}

function renderResult(c){
  const t=L[lang],isEs=lang==='es';
  const alcLbl=withAlc?(isEs?'Con alcohol':'With alcohol'):(isEs?'Sin alcohol':'Mocktail');
  const ings=(c.ingredientes||[]).map(i=>`<div class="ing-i"><div class="idot"></div><span class="iqty">${i.cantidad||''}</span><span>${i.nombre||''}</span></div>`).join('');
  const steps=(c.pasos||[]).map((s,i)=>`<div class="step-i"><span class="sn">${i+1}.</span><span>${s}</span></div>`).join('');
  document.getElementById('result-content').innerHTML=`
    <div class="r-head">
      <span class="r-emoji">${c.emoji||'🍹'}</span>
      <div class="r-badges"><span class="r-badge">${c.personalidad||''}</span><span class="r-badge">${alcLbl}</span></div>
      <div class="r-name">${c.nombre||''}</div>
      <div class="r-tagline">"${c.tagline||''}"</div>
    </div>
    <div class="gdiv"></div>
    <div class="card">
      <div class="clbl">${t.sI}</div>
      <div class="meta-row"><span class="meta-i">${t.mV}: <b>${c.vaso||''}</b></span><span class="meta-i">${t.mT}: <b>${c.tecnica||''}</b></span></div>
      <div class="ing-list">${ings}</div>
    </div>
    <div class="card"><div class="clbl">${t.sP}</div><div class="steps">${steps}</div></div>
    <div class="card"><div class="clbl">${t.sN}</div><div class="bt-note">${c.nota||''}</div></div>
    <div class="act-btns"><button class="abtn out" onclick="resetApp()">${t.bR}</button></div>`;
  show('screen-result');
}

function showError(msg){
  const t=L[lang];
  document.getElementById('result-content').innerHTML=`
    <div class="err-wrap">
      <div class="r-emoji">⚠️</div>
      <div class="err-msg">${t.errTitle}.<br><small>${t.errHint}</small></div>
      <div class="err-detail">${msg}</div>
      <div class="act-btns" style="max-width:300px;margin:0 auto">
        <button class="abtn gold" onclick="generate()">↺ ${t.retry}</button>
        <button class="abtn out" onclick="resetApp()">← ${t.bR}</button>
      </div>
    </div>`;
  show('screen-result');
}

function resetApp(){
  qIdx=0;tags=[];withAlc=null;
  document.getElementById('btn-alc').classList.remove('sel');
  document.getElementById('btn-noalc').classList.remove('sel');
  document.getElementById('start-btn').classList.remove('on');
  show('screen-start');
}
applyStart();
</script>
</body>
</html>
